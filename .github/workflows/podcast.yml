name: Daily Vocabulary Podcast Generator

on:
  schedule:
    # Runs at 23:30 UTC every day (which corresponds to 5:00 AM Indian Standard Time)
    - cron: '30 23 * * *'
  workflow_dispatch: # Allows us to manually trigger it from the GitHub website whenever you want

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Allows the runner script to commit new files back into your repo

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Runtime
      uses: actions/setup-python@v5
      with:
        python-version: '3.12' # Stable enterprise action runner target

    - name: Install Project Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Core Agent Generation Engine
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: python agent.py

    - name: Commit and Save Generated MP3 and Feed updates
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        
        files_to_add=()
        [ -f episodes.json ] && files_to_add+=(episodes.json)
        [ -f feed.xml ] && files_to_add+=(feed.xml)
        shopt -s nullglob
        mp3_files=(*.mp3)
        files_to_add+=("${mp3_files[@]}")
        
        if [ ${#files_to_add[@]} -eq 0 ]; then
          echo "No generated podcast files found to commit"
          exit 0
        fi
        
        git add "${files_to_add[@]}"
        if git diff --cached --quiet; then
          echo "No changes to commit"
        else
          git commit -m "Automated Morning Podcast Release: $(date +'%Y-%m-%d')"
          git push origin main
        fi
